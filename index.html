<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', sans-serif; font-size: 11px; padding: 16px; background: #fff; }
  h2 { text-align: center; font-size: 14px; padding: 8px; border: 1px solid #000; margin-bottom: 4px; }
  .meta { border: 1px solid #000; padding: 5px 8px; margin-bottom: 6px; font-size: 11px; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  th, td { border: 1px solid #999; text-align: center; vertical-align: middle; padding: 2px 1px; font-size: 10px; }
  /* 시간 열 */
  .col-time { width: 36px; }
  /* 요일 그룹 헤더 */
  .day-header { background: #e8e8e8; font-weight: bold; font-size: 10px; }
  /* 계획/실제 서브헤더 */
  .sub-header { background: #f5f5f5; font-size: 9px; color: #444; }
  /* 목표 열 */
  .col-goal { width: 80px; background: #f0f0f0; font-weight: bold; font-size: 10px; }
  .goal-cell { font-size: 9px; vertical-align: top; text-align: left; padding: 3px; }
  /* AM/PM 레이블 행 */
  .time-label { background: #f5f5f5; font-weight: bold; }
  /* 시간 셀 */
  .time-cell { background: #fafafa; }
  /* 입력 가능 셀 */
  td[contenteditable="true"]:focus { background: #fffde7; outline: none; }
  /* 하단 요약 테이블 */
  .summary { margin-top: 6px; width: 100%; border-collapse: collapse; }
  .summary td { border: 1px solid #999; padding: 5px 6px; font-size: 10px; vertical-align: top; }
  .summary .label { background: #e8e8e8; font-weight: bold; width: 60px; text-align: center; }
  .summary .wide { width: 220px; }
  .summary [contenteditable="true"]:focus { background: #fffde7; outline: none; }
  @media print {
    body { padding: 4px; }
    td[contenteditable="true"]:focus { background: #fff; }
  }
</style>
</head>
<body>

<h2>Weekly Check List</h2>
<div class="meta">
  이름 : <span contenteditable="true">이름</span> &nbsp;&nbsp;&nbsp; 기간 : <span contenteditable="true">2026.03.__ ~ 03.__</span>
</div>

<table>
  <colgroup>
    <col class="col-time">
    <!-- 일~토 각 2열 = 14열 -->
    <col span="2" style="width:calc((100% - 36px - 80px)/7)">
    <col span="2" style="width:calc((100% - 36px - 80px)/7)">
    <col span="2" style="width:calc((100% - 36px - 80px)/7)">
    <col span="2" style="width:calc((100% - 36px - 80px)/7)">
    <col span="2" style="width:calc((100% - 36px - 80px)/7)">
    <col span="2" style="width:calc((100% - 36px - 80px)/7)">
    <col span="2" style="width:calc((100% - 36px - 80px)/7)">
    <col class="col-goal">
  </colgroup>
  <thead>
    <tr>
      <th rowspan="2" class="col-time">시간</th>
      <th colspan="2" class="day-header">일</th>
      <th colspan="2" class="day-header">월</th>
      <th colspan="2" class="day-header">화</th>
      <th colspan="2" class="day-header">수</th>
      <th colspan="2" class="day-header">목</th>
      <th colspan="2" class="day-header">금</th>
      <th colspan="2" class="day-header">토</th>
      <th rowspan="2" class="col-goal">금주의 목표<br>(우선순위)</th>
    </tr>
    <tr>
      <th class="sub-header">계획</th><th class="sub-header">실제</th>
      <th class="sub-header">계획</th><th class="sub-header">실제</th>
      <th class="sub-header">계획</th><th class="sub-header">실제</th>
      <th class="sub-header">계획</th><th class="sub-header">실제</th>
      <th class="sub-header">계획</th><th class="sub-header">실제</th>
      <th class="sub-header">계획</th><th class="sub-header">실제</th>
      <th class="sub-header">계획</th><th class="sub-header">실제</th>
    </tr>
  </thead>
  <tbody id="timeBody"></tbody>
</table>

<table class="summary">
  <tr>
    <td class="label">잘한 것</td>
    <td class="wide" contenteditable="true"></td>
    <td class="label">잘하지<br>못한 것</td>
    <td class="wide" contenteditable="true"></td>
    <td class="label">개선해야<br>할 것</td>
    <td contenteditable="true"></td>
  </tr>
  <tr>
    <td class="label">전도 보고<br>및 느낀 점</td>
    <td colspan="5" contenteditable="true" style="min-height:40px"></td>
  </tr>
</table>

<script>
const slots = [
  { label: 'AM 4', ampm: true }, { label: '5' }, { label: '6' },
  { label: '7' }, { label: '8' }, { label: '9' }, { label: '10' },
  { label: '11' },
  { label: 'PM 12', ampm: true }, { label: '1' }, { label: '2' },
  { label: '3' }, { label: '4' }, { label: '5' }, { label: '6' },
  { label: '7' }, { label: '8' }, { label: '9' }, { label: '10' },
  { label: '11' },
  { label: 'AM 12', ampm: true }, { label: '1' }, { label: '2' },
  { label: '3' }
];

const tbody = document.getElementById('timeBody');
let goalSet = false;

slots.forEach((s, i) => {
  const tr = document.createElement('tr');
  // 시간 셀
  const td = document.createElement('td');
  td.className = 'time-cell' + (s.ampm ? ' time-label' : '');
  td.textContent = s.label;
  tr.appendChild(td);
  // 14개 데이터 셀
  for (let c = 0; c < 14; c++) {
    const cell = document.createElement('td');
    cell.contentEditable = 'true';
    cell.style.height = '18px';
    tr.appendChild(cell);
  }
  // 목표 열: 첫 행에만 rowspan
  if (!goalSet) {
    const goalTd = document.createElement('td');
    goalTd.rowSpan = slots.length;
    goalTd.className = 'goal-cell';
    goalTd.contentEditable = 'true';
    tr.appendChild(goalTd);
    goalSet = true;
  }
  tbody.appendChild(tr);
});
</script>
</body>
</html>
